<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock System Dashboard</title>
  <link href="./dashboard_files/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>
  <style>
    body.dark {
      background-color: #121212;
      color: #e0e0e0;
      transition: background 0.3s;
    }

    body.dark .card,
    body.dark .navbar,
    body.dark .form-control,
    body.dark .table {
      background-color: #1e1e1e;
      color: #e0e0e0;
      border-color: #333;
    }

    body.dark .form-control::placeholder {
      color: #666;
    }

    .navbar-brand {
      font-weight: bold;
      letter-spacing: 2px;
    }

    .history-container {
      max-height: 400px;
      overflow-y: auto;
    }

    /* Barcode Scanner Styles */
    .scanner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .barcode-btn {
      padding: 6px 12px;
      border: 2px solid #667eea;
      background: transparent;
      color: #667eea;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .barcode-btn:hover {
      background: #667eea;
      color: white;
    }

    .barcode-btn.active {
      background: #38ef7d;
      border-color: #38ef7d;
      color: white;
      box-shadow: 0 0 10px rgba(56, 239, 125, 0.5);
    }

    .scanner-status {
      font-size: 11px;
      color: #666;
      margin-right: 10px;
    }

    #a-scanner-input,
    #w-scanner-input {
      position: absolute;
      left: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }

    .input-scanned {
      animation: scanFlash 0.5s ease-in-out !important;
      border-color: #38ef7d !important;
    }

    @keyframes scanFlash {

      0%,
      100% {
        border-color: #38ef7d;
      }

      50% {
        border-color: #11998e;
      }
    }
  </style>
</head>

<body class="dark" data-bs-theme="dark">
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>
  <div id="custom-modal-wrapper"></div>

  <!-- Welcome Transition Overlay -->
  <div id="welcome-overlay" class="welcome-overlay" style="display: none;">
    <div class="welcome-container">
      <div class="welcome-icon"><i data-feather="smile"></i></div>
      <div class="welcome-badge">Welcome Aboard</div>
      <h1 class="welcome-title">Welcome!</h1>
      <p class="welcome-subtitle" id="welcome-username">Name</p>
      <p class="welcome-message"><i data-feather="star"></i> You have successfully logged in to the Stock Management
        System</p>
      <button class="welcome-button" onclick="closeWelcomeOverlay()">Let's Go! →</button>
    </div>
  </div>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4 shadow-sm mb-4">
    <div class="container-fluid">
      <span class="navbar-brand mx-auto"><i data-feather="package"></i> STOCK</span>
      <div class="d-flex align-items-center gap-3">
        <span class="text-light d-none d-sm-inline" id="user-display">Welcome!</span>
        <button class="btn btn-outline-light btn-sm me-2 btn-icon" onclick="toggleMode()" id="theme-toggle"><i
            data-feather="sun"></i><span class="visually-hidden">Toggle Theme</span></button>
        <button class="btn btn-outline-danger btn-sm btn-icon" onclick="logout()"><i data-feather="power"></i><span
            class="visually-hidden">Log out</span></button>
      </div>
    </div>
  </nav>

  <div class="container">
    <!-- Admin Control Panel -->
    <div id="admin-panel" style="display: none; margin-bottom: 1.5rem;">
      <div class="alert alert-warning" role="alert">
        <strong><i data-feather="settings"></i> Admin Panel</strong>
        <div style="margin-top: 0.75rem; display: grid; gap: 0.5rem;">
          <button class="btn btn-warning btn-sm btn-icon" onclick="clearAllTransactions()"
            title="Delete all transaction history"><i data-feather="trash-2"></i> Clear History</button>
          <button class="btn btn-danger btn-sm btn-icon" onclick="resetToZero()" title="Complete system reset"><i
              data-feather="refresh-cw"></i> Reset System</button>
          <button class="btn btn-info btn-sm btn-icon" onclick="viewAuditLog()" title="View security audit log"><i
              data-feather="file-text"></i> Audit Log</button>
        </div>
      </div>
    </div>

    <div class="row g-4">
      <!-- Forms Column -->
      <div class="col-lg-6">
        <div class="card shadow-sm p-4 mb-4">
          <div class="scanner-header">
            <h5 class="mb-0 text-primary">Withdraw Stock</h5>
            <button type="button" class="barcode-btn" id="w-barcode-btn" title="Activate barcode scanner">
              <i data-feather="smartphone"></i> Scanner
            </button>
          </div>
          <span class="scanner-status" id="w-scanner-status">○ Scanner Inactive</span>
          <input type="text" id="w-scanner-input" placeholder="Barcode input">
          <div class="row g-3" style="margin-top: 0.5rem;">
            <div class="col-md-6"><input id="w-sku" class="form-control" placeholder="SKU (e.g. SKU-123)"></div>
            <div class="col-md-6"><input id="w-qty" type="number" class="form-control" placeholder="Qty"></div>
            <div class="col-12"><input id="w-desc" class="form-control" placeholder="Description/Remarks"></div>
            <div class="col-12"><button class="btn btn-primary w-100" onclick="processStock('withdraw')"
                id="withdraw-btn"><span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"
                  style="display:none;"></span>Withdraw</button></div>
          </div>
        </div>

        <div class="card shadow-sm p-4">
          <div class="scanner-header">
            <h5 class="mb-0 text-success">Add New Inventory</h5>
            <button type="button" class="barcode-btn" id="a-barcode-btn" title="Activate barcode scanner">
              <i data-feather="smartphone"></i> Scanner
            </button>
          </div>
          <span class="scanner-status" id="a-scanner-status">○ Scanner Inactive</span>
          <input type="text" id="a-scanner-input" placeholder="Barcode input">
          <div class="row g-3" style="margin-top: 0.5rem;">
            <div class="col-md-6"><input id="a-sku" class="form-control" placeholder="SKU"></div>
            <div class="col-md-6"><input id="a-qty" type="number" class="form-control" placeholder="Qty"></div>
            <div class="col-12"><input id="a-desc" class="form-control" placeholder="Description"></div>
            <div class="col-12"><button class="btn btn-success w-100" onclick="processStock('add')" id="add-btn"><span
                  class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"
                  style="display:none;"></span>Add Stock</button>
            </div>
          </div>
        </div>
      </div>

      <!-- History Column -->
      <div class="col-lg-6">
        <div class="card shadow-sm p-4 h-100">
          <h5 class="mb-4">Transaction History</h5>
          <div class="history-container">
            <table class="table table-hover">
              <thead class="sticky-top bg-dark">
                <tr>
                  <th>Item</th>
                  <th>Change</th>
                  <th>Date</th>
                  <th>User</th>
                </tr>
              </thead>
              <tbody id="history-log">
                <tr class="empty-state">
                  <td colspan="4">
                    <div class="empty-state">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 6h18" />
                        <path d="M8 6v12" />
                        <path d="M16 6v12" />
                        <path d="M3 18h18" />
                      </svg>
                      <div>No transactions yet. Add or withdraw stock to get started.</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- Firebase SDK (Compat v8) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics-compat.js"></script>
  <script src="https://unpkg.com/feather-icons"></script>

  <script src="app.js"></script>
</body>

</html>
